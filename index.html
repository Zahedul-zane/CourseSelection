<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="particles-bg">
            <div class="particle particle-1"></div>
            <div class="particle particle-2"></div>
            <div class="particle particle-3"></div>
            <div class="particle particle-4"></div>
            <div class="particle particle-5"></div>
            <div class="particle particle-6"></div>
            <div class="particle particle-7"></div>
            <div class="particle particle-8"></div>
        </div>
    </div>

    <header>
        <h1 class="neon-text">Course Selection System</h1>
        <h1 class="neon-text">Make desktop mode in phone browser</h1>
    </header>

    <main class="container glass-panel">
        <div class="tabs">
            <button class="tab-btn active" data-tab="search">Search Courses</button>
            <button class="tab-btn" data-tab="schedule">View Schedule</button>
        </div>

        <div class="main-content">
            <section id="search-tab" class="tab-content active">
                <div class="tab-grid">
                    <section class="available-section">
                        <h2>Available Courses</h2>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search by course, section or faculty..." autocomplete="off">
                        </div>
                        <div id="courseList" class="scroll-container"></div>
                    </section>

                    <aside class="selected-section glass-panel">
                        <h3>Selected Courses</h3>
                        <ul id="selectedCourses" class="scroll-container"></ul>
                        <div class="selection-summary">
                            <span id="selectCount">0 selected</span>
                        </div>
                    </aside>
                </div>
            </section>

            <section id="schedule-tab" class="tab-content">
                <div class="schedule-container">
                    <h2>Your Schedule</h2>
                    <div class="schedule-grid" id="scheduleGrid"></div>
                    <div id="noScheduleMsg" class="no-schedule">Select courses to view schedule</div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
